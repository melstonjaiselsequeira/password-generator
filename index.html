<!DOCTYPE html>
<html lang="en">

<head>
    <title>PassForge - Random Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="glass-panel">
            <h1>PassForge</h1>
            <p class="subtitle">Create passwords in one click.</p>

            <div class="password-display">
                <span id="password">Click Generate</span>
                <button id="copy-btn" class="icon-btn" title="Copy">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>

            <button id="generate-btn" class="primary-btn">Generate Password</button>

            <div class="options">
                <div class="option">
                    <label>Password Length: <span id="length-val">16</span></label>
                    <input type="range" id="length" min="8" max="32" value="16">
                </div>

                <div class="option checkbox-option">
                    <label>Uppercase</label>
                    <input type="checkbox" id="uppercase" checked>
                </div>

                <div class="option checkbox-option">
                    <label>Numbers</label>
                    <input type="checkbox" id="numbers" checked>
                </div>

                <div class="option checkbox-option">
                    <label>Symbols</label>
                    <input type="checkbox" id="symbols" checked>
                </div>
            </div>

            <div id="toast" class="toast">Copied!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
